              <p>Die Rechtsgrundlage für das Setzen des technisch notwendigen Cookies ist unsere gesetzliche Verpflichtung gem. Art. 6 Abs. 1 UAbs. 1 lit. c i. V. m. Art. 5 Abs. 2 und Art. 7 Abs. 1 DS‑GVO.</p>

              <h2>Verarbeitungen im Zusammenhang mit Google Analytics</h2>
